<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Paramedic-iL">
  <defs>
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#101d2e"/>
      <stop offset="0.55" stop-color="#0a1320"/>
      <stop offset="1" stop-color="#05080d"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.42" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#b3242b" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#b3242b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cf444b"/>
      <stop offset="1" stop-color="#8f2329"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.1" flood-color="#d8333b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- dark navy badge, matching the hero background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#223349" stroke-width="1.5"/>
  <!-- soft red halo behind the star, like the hero -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#halo)"/>

  <!-- EKG / heartbeat line (brighter red), drawn behind the star -->
  <path d="M2,30 H14 L17,30 L19,24 L21,37 L23,22 L25,31 L27,30 H62"
        fill="none" stroke="#d8333b" stroke-opacity="0.5" stroke-width="1.1"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- red outline Star of David (hexagram), muted to match the hero -->
  <g filter="url(#glow)" fill="none" stroke="url(#red)" stroke-width="3.2"
     stroke-linejoin="miter" stroke-miterlimit="10" stroke-opacity="0.95">
    <polygon points="27,7 44.3,37 9.7,37"/>
    <polygon points="27,47 9.7,17 44.3,17"/>
  </g>

  <!-- "iL" monogram, lower-right (geometric, font-independent) -->
  <g fill="#eef3f8">
    <rect x="41" y="42" width="3" height="11" rx="1"/>
    <rect x="41" y="36.5" width="3" height="3" rx="1"/>
    <rect x="48" y="38" width="3.2" height="15" rx="1"/>
    <rect x="48" y="49.8" width="9" height="3.2" rx="1"/>
  </g>
</svg>
