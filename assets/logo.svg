<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Paramedic-iL">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2638"/>
      <stop offset="1" stop-color="#0b1018"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e34a52"/>
      <stop offset="1" stop-color="#b3242b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#d8333b" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- navy badge, coordinating with the site background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#2a3a4f" stroke-width="1.5"/>
  <rect x="2" y="2" width="60" height="28" rx="14" fill="#ffffff" opacity="0.04"/>

  <!-- red Star of David (two overlapping triangles) -->
  <g filter="url(#glow)" fill="url(#red)" stroke="#ef6b73" stroke-width="0.6" stroke-linejoin="round">
    <polygon points="28,5 46,36.5 10,36.5"/>
    <polygon points="28,47 10,15.5 46,15.5"/>
  </g>

  <!-- "iL" monogram in the lower-right corner (geometric, font-independent) -->
  <g fill="#eef3f8">
    <rect x="39.8" y="44" width="3.2" height="12" rx="1"/>
    <rect x="39.8" y="38.6" width="3.2" height="3.2" rx="1"/>
    <rect x="47.6" y="40" width="3.4" height="16" rx="1"/>
    <rect x="47.6" y="52.6" width="10.6" height="3.4" rx="1"/>
  </g>
</svg>
