<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>מבחן חובשים</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    height: 100dvh;
    background: radial-gradient(1000px 600px at 50% -5%, #18223a, #0b1018);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  /* Desktop: render the app inside a phone-sized frame */
  .phone {
    position: relative;
    width: 402px;                 /* ~ iPhone logical width */
    height: 874px;
    max-height: 94vh;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 30px 70px rgba(0,0,0,.55), inset 0 0 0 2px #2a3550;
  }
  .phone .screen {
    width: 100%;
    height: 100%;
    border-radius: 33px;
    overflow: hidden;
    background: #fff;
  }
  .phone iframe { width: 100%; height: 100%; border: 0; display: block; }

  .hint {
    position: fixed;
    bottom: 14px;
    left: 0; right: 0;
    text-align: center;
    color: #6b7a92;
    font-size: 13px;
  }
  .hint a { color: #8fb0d8; text-decoration: none; }

  /* Mobile: drop the frame, go edge-to-edge full screen */
  @media (max-width: 700px) {
    body { background: #fff; display: block; }
    .phone {
      width: 100vw;
      height: 100dvh;
      max-height: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .phone .screen { border-radius: 0; }
    .hint { display: none; }
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <iframe id="app-frame" title="מבחן חובשים"></iframe>
    </div>
  </div>
  <div class="hint">Preview shown at phone size · <a href="../../index.html">&larr; Paramedic-iL home</a></div>

  <script>
    // Pass ?tune=1 through to the app so the size slider appears inside the frame.
    var tune = /[?&]tune=1\b/.test(location.search) ? "?tune=1" : "";
    document.getElementById("app-frame").src = "app.html" + tune;
  </script>
</body>
</html>
